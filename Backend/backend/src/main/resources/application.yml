spring:
  application:
    name: gestorpyme-backend
  profiles:
    default: mock

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:gestorpyme-dev-secret-key-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  security:
    enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
