spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gestorpyme}
    username: ${DATABASE_USER:gestor}
    password: ${DATABASE_PASSWORD:gestor123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed

app:
  security:
    enabled: true
