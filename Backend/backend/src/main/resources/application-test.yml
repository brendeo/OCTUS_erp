spring:
  datasource:
    url: jdbc:h2:mem:gestorpyme;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  security:
    enabled: true
  jwt:
    secret: test-jwt-secret-key-for-unit-tests-only-32chars
    expiration-ms: 3600000
