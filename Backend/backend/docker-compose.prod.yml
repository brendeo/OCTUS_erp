services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestorpyme
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor123
    ports:
      - "5432:5432"
    volumes:
      - gestorpyme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor -d gestorpyme"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/gestorpyme
      DATABASE_USER: gestor
      DATABASE_PASSWORD: gestor123
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env com pelo menos 32 caracteres}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gestorpyme_pgdata:
