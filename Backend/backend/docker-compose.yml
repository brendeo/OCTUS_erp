services:
  postgres:
    image: postgres:16-alpine
    container_name: gestorpyme-db
    environment:
      POSTGRES_DB: gestorpyme
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor123
    ports:
      - "5432:5432"
    volumes:
      - gestorpyme_pgdata:/var/lib/postgresql/data

volumes:
  gestorpyme_pgdata:
